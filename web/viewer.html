<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Viewer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body class="viewer-page">
  <header class="viewer-header">
    <a class="back-link" href="index.html">&larr; Back to gallery</a>
    <h1 id="model-title">Loading...</h1>
    <div class="viewer-hints">
      <span>Left-drag: rotate</span>
      <span>Right-drag: pan</span>
      <span>Scroll: zoom</span>
    </div>
    <button id="dataset-button" class="dataset-button" type="button">View dataset</button>
  </header>

  <div id="viewer-container">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p id="loading-text">Loading model...</p>
    </div>
  </div>

  <div id="dataset-modal" class="dataset-modal hidden" aria-hidden="true">
    <div class="dataset-modal-backdrop" data-close></div>
    <div class="dataset-modal-panel" role="dialog" aria-modal="true" aria-labelledby="dataset-modal-title">
      <header class="dataset-modal-header">
        <div>
          <h2 id="dataset-modal-title">Dataset</h2>
          <p id="dataset-modal-subtitle" class="dataset-modal-subtitle"></p>
        </div>
        <button class="dataset-modal-close" type="button" data-close aria-label="Close dataset viewer">&times;</button>
      </header>
      <div id="dataset-modal-grid" class="dataset-modal-grid"></div>
    </div>
  </div>

  <div id="lightbox" class="lightbox hidden" aria-hidden="true">
    <div class="lightbox-backdrop" data-close></div>
    <button class="lightbox-close" type="button" data-close aria-label="Close image">&times;</button>
    <img id="lightbox-img" alt="" />
    <p id="lightbox-caption" class="lightbox-caption"></p>
  </div>

  <script type="module" src="js/viewer.js"></script>
</body>
</html>
